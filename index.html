<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JergCraft</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#4c763c;
    background-image:
        linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),
        repeating-linear-gradient(
            45deg,
            #5d8a48 0px,
            #5d8a48 16px,
            #4f743d 16px,
            #4f743d 32px
        );
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

#menu{
    text-align:center;
}

h1{
    color:white;
    font-size:64px;
    text-shadow:4px 4px black;
    margin-bottom:30px;
}

button{
    width:260px;
    padding:15px;
    font-size:24px;
    background:#8b8b8b;
    color:white;
    border:3px solid #222;
    cursor:pointer;
    box-shadow:0 4px #444;
}

button:hover{
    background:#a0a0a0;
}

button:active{
    transform:translateY(2px);
    box-shadow:0 2px #444;
}

small{
    display:block;
    color:#ddd;
    margin-top:20px;
}
</style>
</head>
<body>

<div id="menu">
    <h1>JergCrafter</h1>
    <button onclick="play()">Play</button>
    <small>Powered by Jergan Studio</small>
</div>

<script>
function play(){
    window.location.replace("jergcraft/index.html");
}
</script>

</body>
</html>
