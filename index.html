<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JergCrafter</title>

<style>
body{margin:0;background:#000;font-family:Arial;overflow:hidden}
#menu{position:absolute;inset:0;display:flex;flex-direction:column;
justify-content:center;align-items:center;background:#111;color:#fff}
h1{color:#55ff55;text-shadow:0 0 10px #0f0}
input{padding:10px;margin:10px;font-size:16px}
button{padding:12px 30px;border:0;border-radius:8px;background:#2ecc71;color:#fff;cursor:pointer}
iframe{width:100vw;height:100vh;border:0;display:none}
</style>
</head>

<body>

<div id="menu">
<h1>JergCrafter</h1>
<input id="name" placeholder="Username">
<button onclick="play()">Play</button>
</div>

<iframe id="game" src="eaglercraft/index.html"></iframe>

<script>
let nameBox=document.getElementById("name");

// load saved data
nameBox.value=localStorage.getItem("name")||"Player";

// save function
function save(){
localStorage.setItem("name",nameBox.value);
localStorage.setItem("lastPlayed",Date.now());
}

// play game
function play(){
save();
document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";
}

// autosave
setInterval(save,3000);

// backup save on exit
window.onbeforeunload=save;
</script>

</body>
</html>
