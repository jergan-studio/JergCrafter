<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JergCrafter</title>

<style>
body{margin:0;background:#000;font-family:Arial}
#menu{position:absolute;inset:0;display:flex;flex-direction:column;
justify-content:center;align-items:center;background:#111;color:#fff}
h1{color:#55ff55;text-shadow:0 0 10px #0f0}
button{padding:12px 30px;border:0;border-radius:8px;
background:#2ecc71;color:#fff;cursor:pointer}
iframe{width:100vw;height:100vh;border:0;display:none}
</style>
</head>

<body>

<div id="menu">
<h1>JergCrafter</h1>
<button onclick="play()">Play</button>
</div>

<iframe id="game" src="eaglercraft/index.html"></iframe>

<script>
function play(){
document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";
}
</script>

</body>
</html>
